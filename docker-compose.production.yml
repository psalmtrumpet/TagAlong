version: '3.8'

services:
  # API Gateway
  api-gateway:
    image: ${DOCKER_REGISTRY:-tagalong}/api-gateway:${TAG:-latest}
    build:
      context: .
      dockerfile: src/ApiGateway/Dockerfile
    container_name: tagalong-api-gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
    ports:
      - "80:80"
    depends_on:
      - identity-api
      - user-api
      - trip-api
      - package-api
      - payment-api
      - notification-api
      - messaging-api
      - review-api
      - report-api
      - configuration-api
    networks:
      - tagalong-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # Microservices
  identity-api:
    image: ${DOCKER_REGISTRY:-tagalong}/identity-api:${TAG:-latest}
    build:
      context: .
      dockerfile: src/Services/Identity/TagAlong.Identity.API/Dockerfile
    container_name: tagalong-identity-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=${IDENTITY_DB_CONNECTION}
      - RabbitMQ__HostName=${RABBITMQ_HOST}
      - RabbitMQ__UserName=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD}
      - Jwt__Key=${JWT_SECRET_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Google__ClientId=${GOOGLE_CLIENT_ID}
      - Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
    networks:
      - tagalong-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  user-api:
    image: ${DOCKER_REGISTRY:-tagalong}/user-api:${TAG:-latest}
    build:
      context: .
      dockerfile: src/Services/User/TagAlong.User.API/Dockerfile
    container_name: tagalong-user-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=${USER_DB_CONNECTION}
      - RabbitMQ__HostName=${RABBITMQ_HOST}
      - RabbitMQ__UserName=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD}
      - Jwt__Key=${JWT_SECRET_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
    networks:
      - tagalong-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  trip-api:
    image: ${DOCKER_REGISTRY:-tagalong}/trip-api:${TAG:-latest}
    build:
      context: .
      dockerfile: src/Services/Trip/TagAlong.Trip.API/Dockerfile
    container_name: tagalong-trip-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=${TRIP_DB_CONNECTION}
      - RabbitMQ__HostName=${RABBITMQ_HOST}
      - RabbitMQ__UserName=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD}
      - Jwt__Key=${JWT_SECRET_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
    networks:
      - tagalong-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  package-api:
    image: ${DOCKER_REGISTRY:-tagalong}/package-api:${TAG:-latest}
    build:
      context: .
      dockerfile: src/Services/Package/TagAlong.Package.API/Dockerfile
    container_name: tagalong-package-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
