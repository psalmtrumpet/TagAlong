server {
    listen 80;
    server_name www.tlimc.net tlimc.net;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name www.tlimc.net tlimc.net;

    ssl_certificate /etc/letsencrypt/live/tlimc.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tlimc.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # WebSocket for SignalR
    location /notificationHub/ {
        proxy_pass http://api-gateway:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # TagAlong API routes → API Gateway
    location /api/ {
        proxy_pass http://api-gateway:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Existing static website
    location / {
        root /var/www/tlimc;
        index index.html;
        try_files $uri $uri/ =404;
    }
}

server {
    listen 80;
    server_name tagalong.delivery www.tagalong.delivery;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://tagalong.delivery$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name tagalong.delivery www.tagalong.delivery;

    ssl_certificate /etc/letsencrypt/live/tagalong.delivery-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tagalong.delivery-0001/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Redirect www to non-www
    if ($host = www.tagalong.delivery) {
        return 301 https://tagalong.delivery$request_uri;
    }

    root /var/www/tagalong-delivery;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
